<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AI App Architect</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/zustand/4.5.2/umd/index.production.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Kanit', sans-serif;
    }
    body {
      background-color: #EFF6FF;
      padding: 16px;
      min-height: 100vh;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      position: relative;
      padding-bottom: 80px;
    }
    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .app-title {
      color: #1E3A8A;
      font-weight: 500;
      font-size: 24px;
    }
    .action-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .btn-action {
      background: white;
      border: 1px solid #CBD5E1;
      color: #475569;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }
    .btn-action:hover {
      background: #F8FAFC;
      border-color: #94A3B8;
      color: #1E293B;
    }
    .fab {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #3B82F6;
      color: white;
      border: none;
      border-radius: 50px;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 500;
      box-shadow: 0 4px 12px rgba(59,130,246,0.4);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 1000;
    }
    .fab:hover {
      background: #2563EB;
    }
    .fab-delete {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: #EF4444;
      color: white;
      border: none;
      border-radius: 50px;
      padding: 14px 24px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 4px 12px rgba(239,68,68,0.4);
      cursor: pointer;
      z-index: 1000;
    }
    .fab-delete:hover {
      background: #DC2626;
    }
    .module-card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .module-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    .module-title {
      font-size: 18px;
      font-weight: 500;
      color: #1E3A8A;
    }
    .module-subtitle {
      font-size: 13px;
      color: #64748B;
      margin-top: 2px;
    }
    .expand-icon {
      font-size: 20px;
      color: #64748B;
      transition: transform 0.2s;
    }
    .subfeature-list {
      margin-top: 12px;
    }
    .subfeature-card {
      background: #E8F0FE;
      border-radius: 12px;
      padding: 12px;
      margin: 8px 0;
    }
    .subfeature-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    .subfeature-name {
      font-weight: 500;
      color: #1E3A8A;
    }
    .detail-box {
      margin-top: 10px;
      padding: 10px;
      background: rgba(255,255,255,0.6);
      border-radius: 8px;
    }
    .detail-row {
      display: flex;
      margin-bottom: 6px;
      font-size: 13px;
    }
    .detail-label {
      font-weight: 500;
      width: 80px;
      color: #334155;
    }
    .detail-value {
      color: #1E293B;
      flex: 1;
    }
    .chip {
      display: inline-block;
      background: #DBEAFE;
      color: #1E40AF;
      border-radius: 20px;
      padding: 2px 12px;
      margin-right: 4px;
      margin-bottom: 4px;
      font-size: 12px;
    }
    .btn-small {
      background: transparent;
      border: 1px solid #3B82F6;
      color: #3B82F6;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 13px;
      cursor: pointer;
      margin-top: 6px;
    }
    .btn-delete {
      background: transparent;
      border: 1px solid #EF4444;
      color: #EF4444;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      margin-top: 6px;
      margin-left: 6px;
    }
    .add-sub-btn {
      margin-top: 10px;
      display: flex;
      justify-content: flex-start;
    }
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .modal-content {
      background: white;
      border-radius: 16px;
      padding: 24px;
      width: 90%;
      max-width: 400px;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
    }
    .modal-title {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 16px;
      color: #1E3A8A;
    }
    input, textarea, select {
      width: 100%;
      padding: 8px 12px;
      margin: 8px 0;
      border: 1px solid #CBD5E1;
      border-radius: 8px;
      font-size: 14px;
    }
    .btn-primary {
      background: #3B82F6;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 12px;
      width: 100%;
    }
    .btn-close {
      background: transparent;
      border: none;
      font-size: 24px;
      position: absolute;
      top: 10px;
      right: 16px;
      cursor: pointer;
    }
    .empty-state {
      text-align: center;
      color: #64748B;
      margin-top: 60px;
    }
    .guardrail-ok { color: #10B981; }
    .guardrail-warning { color: #F59E0B; }
    .guardrail-error { color: #EF4444; }
    .priority-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
      margin-left: 8px;
    }
    .priority-critical { background: #FEE2E2; color: #991B1B; }
    .priority-high { background: #FFEDD5; color: #9A3412; }
    .priority-medium { background: #DBEAFE; color: #1E40AF; }
    .priority-low { background: #F3F4F6; color: #374151; }
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #10B981;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 3000;
      animation: fadeInOut 2s ease;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .toast.error {
      background: #EF4444;
    }
    @keyframes fadeInOut {
      0% { opacity: 0; top: 0; }
      10% { opacity: 1; top: 20px; }
      90% { opacity: 1; top: 20px; }
      100% { opacity: 0; top: 0; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { create } = window.zustand || {};

    function generateId() {
      return 'id_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now().toString(36);
    }

    const STORAGE_KEY = 'ai_app_architect_project';
    function loadProject() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const parsed = JSON.parse(saved);
          if (parsed && Array.isArray(parsed.modules)) {
            return { projectId: parsed.projectId || generateId(), modules: parsed.modules };
          }
        }
      } catch (e) {
        console.warn('Failed to load from localStorage:', e);
      }
      return null;
    }
    
    function saveProject(project) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(project));
      } catch (e) {
        console.warn('Failed to save to localStorage:', e);
      }
    }

    // ---------- Content Store ----------
    const useContentStore = create((set, get) => ({
      project: loadProject() || {
        projectId: generateId(),
        modules: [],
      },
      importProject: (newProject) => set(() => {
        saveProject(newProject);
        return { project: newProject };
      }),
      addModule: (name, type) => set((state) => {
        const newProject = {
          ...state.project,
          modules: [
            ...state.project.modules,
            {
              id: generateId(),
              name,
              type,
              status: 'draft',
              subFeatures: [],
            },
          ],
        };
        saveProject(newProject);
        return { project: newProject };
      }),
      addSubFeature: (moduleId, name) => set((state) => {
        const newProject = {
          ...state.project,
          modules: state.project.modules.map((mod) =>
            mod.id === moduleId
              ? {
                  ...mod,
                  subFeatures: [
                    ...mod.subFeatures,
                    {
                      id: generateId(),
                      name,
                      priority: 'medium',
                      constraints: [],
                      skills: [],
                      dataSources: [],
                      plugins: [],
                      generalDescription: '',
                      guardrailStatus: 'warning',
                    },
                  ],
                }
              : mod
          ),
        };
        saveProject(newProject);
        return { project: newProject };
      }),
      updateSubFeature: (moduleId, subId, data) => set((state) => {
        const newProject = {
          ...state.project,
          modules: state.project.modules.map((mod) =>
            mod.id === moduleId
              ? {
                  ...mod,
                  subFeatures: mod.subFeatures.map((sub) =>
                    sub.id === subId ? { ...sub, ...data } : sub
                  ),
                }
              : mod
          ),
        };
        saveProject(newProject);
        return { project: newProject };
      }),
      deleteModule: (moduleId) => set((state) => {
        const newProject = {
          ...state.project,
          modules: state.project.modules.filter((mod) => mod.id !== moduleId),
        };
        saveProject(newProject);
        return { project: newProject };
      }),
      deleteSubFeature: (moduleId, subId) => set((state) => {
        const newProject = {
          ...state.project,
          modules: state.project.modules.map((mod) =>
            mod.id === moduleId
              ? {
                  ...mod,
                  subFeatures: mod.subFeatures.filter((sub) => sub.id !== subId),
                }
              : mod
          ),
        };
        saveProject(newProject);
        return { project: newProject };
      }),
      resetProject: () => set(() => {
        const newProject = { projectId: generateId(), modules: [] };
        localStorage.removeItem(STORAGE_KEY);
        return { project: newProject };
      }),
    }));

    // ---------- UI Store ----------
    const useUIStore = create((set) => ({
      expandedModules: [],
      expandedSubFeatures: [],
      editingSub: null,
      toastMessage: null,
      toastType: 'success',
      toggleModuleExpand: (id) => set((state) => ({
        expandedModules: state.expandedModules.includes(id)
          ? state.expandedModules.filter((mid) => mid !== id)
          : [...state.expandedModules, id],
      })),
      toggleSubExpand: (id) => set((state) => ({
        expandedSubFeatures: state.expandedSubFeatures.includes(id)
          ? state.expandedSubFeatures.filter((sid) => sid !== id)
          : [...state.expandedSubFeatures, id],
      })),
      openEditor: (moduleId, subId) => set({ editingSub: { moduleId, subId } }),
      closeEditor: () => set({ editingSub: null }),
      showToast: (msg, type = 'success') => {
        set({ toastMessage: msg, toastType: type });
        setTimeout(() => set({ toastMessage: null }), 2500);
      },
    }));

    // ---------- Components ----------
    const Toast = () => {
      const { toastMessage, toastType } = useUIStore();
      if (!toastMessage) return null;
      return <div className={`toast ${toastType === 'error' ? 'error' : ''}`}>{toastMessage}</div>;
    };

    const SubFeatureCard = ({ moduleId, sub }) => {
      const { expandedSubFeatures, toggleSubExpand, openEditor, showToast } = useUIStore();
      const deleteSubFeature = useContentStore(s => s.deleteSubFeature);
      const isOpen = expandedSubFeatures.includes(sub.id);

      const getPriorityClass = (priority) => {
        switch(priority) {
          case 'critical': return 'priority-critical';
          case 'high': return 'priority-high';
          case 'medium': return 'priority-medium';
          case 'low': return 'priority-low';
          default: return '';
        }
      };

      const handleDelete = (e) => {
        e.stopPropagation();
        if (confirm(`Delete "${sub.name}"?`)) {
          deleteSubFeature(moduleId, sub.id);
          showToast('Sub-feature deleted');
        }
      };

      return (
        <div className="subfeature-card">
          <div className="subfeature-header" onClick={() => toggleSubExpand(sub.id)}>
            <span>
              <span className="subfeature-name">{sub.name}</span>
              <span className={`priority-badge ${getPriorityClass(sub.priority)}`}>{sub.priority}</span>
            </span>
            <span className="expand-icon">{isOpen ? '▲' : '▼'}</span>
          </div>
          {isOpen && (
            <div className="detail-box">
              <div className="detail-row">
                <span className="detail-label">Constraints:</span>
                <span className="detail-value">
                  {sub.constraints.length ? sub.constraints.map(c => <span key={c} className="chip">{c}</span>) : 'None'}
                </span>
              </div>
              <div className="detail-row">
                <span className="detail-label">Skills:</span>
                <span className="detail-value">
                  {sub.skills.length ? sub.skills.map(s => <span key={s} className="chip">{s}</span>) : 'None'}
                </span>
              </div>
              <div className="detail-row">
                <span className="detail-label">Plugins:</span>
                <span className="detail-value">
                  {sub.plugins.length ? sub.plugins.map(p => <span key={p} className="chip">{p}</span>) : 'None'}
                </span>
              </div>
              <div className="detail-row">
                <span className="detail-label">Guardrail:</span>
                <span className={`detail-value guardrail-${sub.guardrailStatus}`}>{sub.guardrailStatus}</span>
              </div>
              <button className="btn-small" onClick={() => openEditor(moduleId, sub.id)}>✏️ Edit</button>
              <button className="btn-delete" onClick={handleDelete}>🗑 Delete</button>
            </div>
          )}
        </div>
      );
    };

    const CoreModuleCard = ({ module }) => {
      const { expandedModules, toggleModuleExpand, showToast } = useUIStore();
      const addSubFeature = useContentStore(s => s.addSubFeature);
      const deleteModule = useContentStore(s => s.deleteModule);
      const isExpanded = expandedModules.includes(module.id);

      const handleDelete = (e) => {
        e.stopPropagation();
        if (confirm(`Delete entire module "${module.name}" and all its sub-features?`)) {
          deleteModule(module.id);
          showToast('Module deleted');
        }
      };

      return (
        <div className={`module-card ${isExpanded ? 'expanded' : ''}`}>
          <div className="module-header" onClick={() => toggleModuleExpand(module.id)}>
            <div>
              <div className="module-title">{module.name}</div>
              <div className="module-subtitle">
                Type: {module.type} • Status: {module.status} • Sub-features: {module.subFeatures.length}
              </div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
              <button className="btn-delete" onClick={handleDelete} style={{ marginTop: 0 }}>🗑</button>
              <span className="expand-icon">{isExpanded ? '▲' : '▼'}</span>
            </div>
          </div>
          {isExpanded && (
            <div className="subfeature-list">
              {module.subFeatures.map(sub => (
                <SubFeatureCard key={sub.id} moduleId={module.id} sub={sub} />
              ))}
              <div className="add-sub-btn">
                <button className="btn-small" onClick={() => addSubFeature(module.id, 'New Sub-feature')}>+ Add Sub-feature</button>
              </div>
            </div>
          )}
        </div>
      );
    };

    const EditModal = () => {
      const { editingSub, closeEditor, showToast } = useUIStore();
      const modules = useContentStore(s => s.project.modules);
      const updateSubFeature = useContentStore(s => s.updateSubFeature);
      
      const [priority, setPriority] = React.useState('medium');
      const [constraintsStr, setConstraintsStr] = React.useState('');
      const [skills, setSkills] = React.useState([]);
      const [plugins, setPlugins] = React.useState([]);
      const [newSkill, setNewSkill] = React.useState('');
      const [newPlugin, setNewPlugin] = React.useState('');

      const sub = editingSub
        ? modules.find(m => m.id === editingSub.moduleId)?.subFeatures.find(s => s.id === editingSub.subId)
        : null;

      React.useEffect(() => {
        if (sub) {
          setPriority(sub.priority);
          const safeConstraints = Array.isArray(sub.constraints) ? sub.constraints : [];
          setConstraintsStr(safeConstraints.join(', '));
          setSkills([...sub.skills]);
          setPlugins([...sub.plugins]);
        }
      }, [sub]);

      if (!editingSub || !sub) return null;

      const handleSave = () => {
        const constraintsArray = (typeof constraintsStr === 'string' ? constraintsStr : '')
          .split(',')
          .map(s => s.trim())
          .filter(Boolean);

        updateSubFeature(editingSub.moduleId, editingSub.subId, {
          priority,
          constraints: constraintsArray,
          skills,
          plugins,
          guardrailStatus: (priority === 'critical' && constraintsArray.length === 0) ? 'error' : 'ok',
        });
        showToast('Sub-feature updated');
        closeEditor();
      };

      const addSkill = () => {
        if (newSkill.trim() && !skills.includes(newSkill.trim())) {
          setSkills([...skills, newSkill.trim()]);
          setNewSkill('');
        }
      };
      const removeSkill = (skill) => setSkills(skills.filter(s => s !== skill));

      const addPlugin = () => {
        if (newPlugin.trim() && !plugins.includes(newPlugin.trim())) {
          setPlugins([...plugins, newPlugin.trim()]);
          setNewPlugin('');
        }
      };
      const removePlugin = (plugin) => setPlugins(plugins.filter(p => p !== plugin));

      return (
        <div className="modal-overlay" onClick={closeEditor}>
          <div className="modal-content" onClick={(e) => e.stopPropagation()}>
            <span className="btn-close" onClick={closeEditor}>&times;</span>
            <div className="modal-title">Edit {sub.name}</div>
            
            <label>Priority</label>
            <select value={priority} onChange={(e) => setPriority(e.target.value)}>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
              <option value="critical">Critical</option>
            </select>

            <label>Constraints (comma separated)</label>
            <input type="text" placeholder="e.g. GDPR, Offline first" value={constraintsStr} onChange={(e) => setConstraintsStr(e.target.value)} />

            <label>Skills</label>
            <div>
              {skills.map(skill => (
                <span key={skill} className="chip" style={{ cursor: 'pointer' }} onClick={() => removeSkill(skill)}>{skill} ✕</span>
              ))}
            </div>
            <div style={{ display: 'flex', gap: '8px' }}>
              <input type="text" placeholder="Add skill" value={newSkill} onChange={(e) => setNewSkill(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && addSkill()} style={{ flex: 1 }} />
              <button className="btn-small" onClick={addSkill}>Add</button>
            </div>

            <label style={{ marginTop: '12px' }}>Plugins</label>
            <div>
              {plugins.map(plugin => (
                <span key={plugin} className="chip" style={{ cursor: 'pointer' }} onClick={() => removePlugin(plugin)}>{plugin} ✕</span>
              ))}
            </div>
            <div style={{ display: 'flex', gap: '8px' }}>
              <input type="text" placeholder="Add plugin" value={newPlugin} onChange={(e) => setNewPlugin(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && addPlugin()} style={{ flex: 1 }} />
              <button className="btn-small" onClick={addPlugin}>Add</button>
            </div>

            <button className="btn-primary" onClick={handleSave}>Save</button>
          </div>
        </div>
      );
    };

    const App = () => {
      const { project, addModule, resetProject, importProject } = useContentStore();
      const { editingSub, showToast } = useUIStore();
      const fileInputRef = React.useRef(null);

      const handleReset = () => {
        if (confirm('Delete all modules and start over? This cannot be undone.')) {
          resetProject();
          showToast('Project reset');
        }
      };

      const handleExport = () => {
        if (project.modules.length === 0) {
          showToast('Project is empty', 'error');
          return;
        }
        
        const exportData = {
          appName: "AI App Architect Project",
          exportedAt: new Date().toISOString(),
          version: "1.0",
          project: project
        };

        const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `ai_app_architect_${new Date().getTime()}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        showToast('Project exported successfully!');
      };

      const handleImport = (event) => {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const parsedData = JSON.parse(e.target.result);
            // Validate JSON Structure
            if (parsedData && parsedData.project && Array.isArray(parsedData.project.modules)) {
              importProject(parsedData.project);
              showToast('Project imported successfully!');
            } else {
              showToast('Invalid JSON structure', 'error');
            }
          } catch (error) {
            console.error("Error parsing JSON:", error);
            showToast('Error reading file', 'error');
          }
          // รีเซ็ตค่า input เผื่อผู้ใช้อัปโหลดไฟล์เดิมซ้ำ
          event.target.value = '';
        };
        reader.readAsText(file);
      };

      return (
        <div className="container">
          <Toast />
          
          <div className="app-header">
            <h2 className="app-title">🧠 AI App Architect</h2>
          </div>

          {/* แถบเครื่องมือสำหรับ Export / Import */}
          <div className="action-bar">
            <button className="btn-action" onClick={() => fileInputRef.current.click()}>
              📥 Import JSON
            </button>
            <input 
              type="file" 
              accept=".json" 
              style={{ display: 'none' }} 
              ref={fileInputRef} 
              onChange={handleImport} 
            />
            
            <button className="btn-action" onClick={handleExport}>
              📤 Export JSON
            </button>
          </div>

          {project.modules.length === 0 && (
            <div className="empty-state">
              <p style={{ fontSize: '18px', marginBottom: '8px' }}>No modules yet</p>
              <p>Tap <strong>+ Add Core Module</strong> to start designing your app!</p>
              <p style={{ fontSize: '14px', marginTop: '16px' }}>Or click <strong>Import JSON</strong> above to load a project.</p>
            </div>
          )}

          {project.modules.map(mod => (
            <CoreModuleCard key={mod.id} module={mod} />
          ))}

          <button className="fab" onClick={() => addModule('New Module', 'feature')}>
            <span style={{ fontSize: '20px' }}>+</span> Add Core Module
          </button>
          
          {project.modules.length > 0 && (
            <button className="fab-delete" onClick={handleReset}>
              🗑 Reset All
            </button>
          )}

          {editingSub && <EditModal />}
        </div>
      );
    };

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
